default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.2
    hooks:
      - id: ruff-check
        name: Lint with Ruff
        types_or: [ python, pyi ]
        args: [ --fix ]
      - id: ruff-format
        name: Format with Ruff
        types_or: [ python, pyi ]

  - repo: local
    hooks:
      - id: mypy
        name: Type-check with mypy
        entry: mypy
        language: system
        types: [ python ]
        require_serial: true
        files: ^src/

  - repo: local
    hooks:
      - id: check-commit-msg
        name: Check commit message format
        entry: python dev/check_commit_msg.py
        language: system
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: review-badge
        name: Regenerate review-coverage badge
        entry: bash -c 'if [[ "$(git symbolic-ref --short HEAD)" == "dark" ]]; then exit 0; fi; python dev/dark/badge.py'
        language: system
        pass_filenames: false
        always_run: true
